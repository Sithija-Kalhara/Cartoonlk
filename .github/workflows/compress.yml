name: Free Video Encoder

on:
  repository_dispatch:
    types: [compress_video]

jobs:
  encode:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install System FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install ffmpeg -y

      - name: Install Script Dependencies
        run: |
          npm install telegram axios

      - name: Download Video using Streaming Server
        run: |
          STREAM_URL="https://cartoonlk-stream.onrender.com/stream/${{ github.event.client_payload.channel_id }}/${{ github.event.client_payload.message_id }}"
          echo "Downloading from: $STREAM_URL"
          curl -L "$STREAM_URL" -o original_video.mp4

      # 🎬 1. Quality එක සුපිරියට තියාගෙන 480p වලට කන්වර්ට් කිරීම
      - name: Compress Video to 480p
        run: |
          ffmpeg -i original_video.mp4 -vf scale=-2:480 -c:v libx264 -crf 28 -preset fast compressed_480p.mp4

      # 🎬 2. Quality එක සුපිරියට තියාගෙන 720p වලට කන්වර්ට් කිරීම
      - name: Compress Video to 720p
        run: |
          ffmpeg -i original_video.mp4 -vf scale=-2:720 -c:v libx264 -crf 25 -preset fast compressed_720p.mp4

      # 📤 3. GramJS Script එක හරහා සීමාවන් රහිතව Telegram එකට Upload කිරීම
      - name: Run GramJS Upload Script
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_STRING_SESSION: ${{ secrets.TELEGRAM_STRING_SESSION }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          ORIGINAL_MESSAGE_ID: ${{ github.event.client_payload.message_id }}
          BACKEND_URL: "https://cartoonlk.com" # 🚨 ඔයාගේ Main Express Web Server URL එක මෙතනට දාන්න
        run: |
          node upload.js
